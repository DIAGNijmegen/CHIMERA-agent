# ============================================================================
# Single-service stack for the LLM-Biopsy-Decision Evaluator.
#
# Compose is kept ONLY as a developer convenience.  The image itself is fully
# self-contained — on Grand Challenge (or any platform that just does
# `docker run ...`) you do not need compose at all.  See README.md for the
# raw `docker run` command.
#
# Quick start (from the repo root):
#   make run
#   # or:
#   HOST_UID=$(id -u) HOST_GID=$(id -g) \
#     docker compose -f docker/docker-compose.yml up --build evaluator
# ============================================================================

services:
  evaluator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: biopsy-evaluator:latest
    container_name: ${COMPOSE_NAME_PREFIX:-biopsy-eval}_${USER:-anon}

    # Run as the host user so files written under /output land with the right
    # ownership.  HOST_UID / HOST_GID are exported by the Makefile.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    volumes:
      # /ground_truth — read-only pathologist responses, laid out as
      #                 taskN/case_id/pathologist_response.json.
      - ${GROUND_TRUTH_DIR:-../ground_truth}:/ground_truth:ro
      # /test/outputs — read-only predictions, laid out as
      #                 taskN/case_id/prediction.json.
      - ${TEST_OUTPUTS_DIR:-../test/outputs}:/test/outputs:ro
      # /output — writable results directory on the host.
      - ${OUTPUT_DIR:-../results}:/output
      # /models — persistent Ollama model store (survives container removal,
      #           shared across runs).
      - ${OLLAMA_MODELS_DIR:-../models}:/models
      # Mount host user/group dbs read-only so the in-container UID resolves
      # to a real username (graphviz, deepeval cache, etc. won't complain).
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    environment:
      - HOME=/tmp
      - TASK_ID=${TASK_ID:-task1}
      - GROUND_TRUTH_DIR=/ground_truth/${TASK_ID:-task1}
      - TEST_OUTPUTS_DIR=/test/outputs/${TASK_ID:-task1}
      - JUDGE_MODEL=${JUDGE_MODEL:-gemma4:e4b}
      - USE_RATIONALE_JUDGE=${USE_RATIONALE_JUDGE:-1}
      - ALLOW_MODEL_PULL=${ALLOW_MODEL_PULL:-1}
      # NVIDIA_VISIBLE_DEVICES: tells the NVIDIA Container Toolkit which
      # physical GPU to expose.  Docker remaps it to device 0 inside the
      # container. Do NOT also set CUDA_VISIBLE_DEVICES — Ollama warns that
      # manually overriding it can prevent GPU discovery.
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE_ID:-0}

    # GPU access — requires NVIDIA Container Toolkit on the host.
    # Comment this block out for a CPU-only run (also set USE_RATIONALE_JUDGE=0).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
